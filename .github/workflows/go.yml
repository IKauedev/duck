name: Go

on:
  push:
    branches:
      - develop
      - master
      - hotfix/*
      - release/*
      - feature/*
  pull_request:
    branches:
      - develop
      - master
      - hotfix/*
      - release/*
      - feature/*

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF_NAME" ]; then
            VERSION="$(git describe --tags --always --dirty 2>/dev/null || echo dev)"
            VERSION="${VERSION#v}"
          fi
          COMMIT="$(git rev-parse --short HEAD 2>/dev/null || echo unknown)"
          DATE="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-X github.com/IKauedev/duck/internal/version.Version=${VERSION} -X github.com/IKauedev/duck/internal/version.Commit=${COMMIT} -X github.com/IKauedev/duck/internal/version.Date=${DATE}"
          go build -ldflags "${LDFLAGS}" ./...
