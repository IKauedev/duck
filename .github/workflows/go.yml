name: Go

on:
  push:
    branches:
      - develop
      - master
      - hotfix/*
      - release/*
      - feature/*
  pull_request:
    branches:
      - develop
      - master
      - hotfix/*
      - release/*
      - feature/*

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Verify formatting
        run: |
          test -z "$(gofmt -l .)"

      - name: Vet
        run: go vet ./...

      - name: Test
        run: go test ./...

      - name: Build
        run: go build ./...
